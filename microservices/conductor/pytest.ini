[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# importlib mode avoids tests/ package namespace collision when running
# multiple microservice suites from the repo root in one pytest invocation
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --import-mode=importlib

testpaths = tests

asyncio_mode = auto

markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require external services)
