services:
  #1. PostgreSQL Database Service
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: "no"
    env_file:
      - .env  # Load environment variables from .env file
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vtrack-network

  #2. Redis Message Queue Service
  redis:
    image: redis:7-alpine
    container_name: redis_queue
    restart: "no"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - vtrack-network

  #3. FastAPI Application Service
  api:
    build: .
    container_name: fastapi_api
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env  # Load the same environment file
      - .env.dev  # Load development overrides
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      VNC_BROWSER_URL: http://vnc-browser:8080
      VNC_CONTAINER_NAME: vnc_browser
      PROGRAMMED_STEPS_PATH: /data/programmed_steps.json
      LOGIN_EMAIL: ${LOGIN_EMAIL}
      LOGIN_PASSWORD: ${LOGIN_PASSWORD}
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app
      - ./requirements.txt:/app/requirements.txt  # Sync requirements
      - ./shared-package:/app/shared-package
      - ./data:/data:ro                           # programmed_steps.json (read-only)
      - /var/run/docker.sock:/var/run/docker.sock # start/stop vnc-browser on demand
    stdin_open: true
    tty: true
    networks:
      - vtrack-network
    # Development-specific settings
    working_dir: /app

  #4. VNC Browser — on-demand, started by api when cookie refresh is triggered
  vnc-browser:
    build:
      context: docker/vnc-browser
    container_name: vnc_browser
    profiles:
      - tools
    ports:
      - "6080:6080"   # noVNC web viewer — http://localhost:6080/vnc.html?autoconnect=1&resize=scale
    networks:
      - vtrack-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - vtrack-network

  # Migration service: runs Alembic migrations against the DB
  migrate:
    build: .
    container_name: migrate_job
    restart: "no"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head
    working_dir: /app
    volumes:
      - ./alembic.ini:/app/alembic.ini:ro
      - ./alembic:/app/alembic:ro
      - ./app:/app/app:ro
    networks:
      - vtrack-network

  # Microservices - Alert Processor
  alert-processor:
    build:
      context: .
      dockerfile: microservices/alert-processor/Dockerfile
    container_name: alert_processor
    restart: "no"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: 1
    ports:
      - "5679:5679"  # Debug port
    volumes:
      - ./shared-package/src/shared/zones.yaml:/usr/local/lib/python3.11/site-packages/shared/zones.yaml
    networks:
      - vtrack-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  # Microservices - Notification Sender
  notification-sender:
    build:
      context: .
      dockerfile: microservices/notification-sender/Dockerfile
    container_name: notification_sender
    restart: "no"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      POLL_INTERVAL: 2
    env_file:
      - .env
    volumes:
      - ./microservices/notification-sender:/app
      - ./shared-package:/tmp/shared-package
    networks:
      - vtrack-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Conductor — always-on container lifecycle manager
  conductor:
    build:
      context: .
      dockerfile: microservices/conductor/Dockerfile
    container_name: conductor
    restart: always
    environment:
      VTRACK_BASE_URL: http://api:8000
      MANAGED_CONTAINERS: fastapi_api,postgres_db,redis_queue,alert_processor,notification_sender
      SLOT_MORNING_WINDOW_OPEN: "05:00"
      SLOT_MORNING_WINDOW_CLOSE: "06:40"
      SLOT_AFTERNOON_WINDOW_OPEN: "14:30"
      SLOT_AFTERNOON_WINDOW_CLOSE: "16:30"
      MEMORY_THRESHOLD_MB: "256"
      TZ: America/Bogota
      PYTHONUNBUFFERED: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - vtrack-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:

networks:
  vtrack-network:
    driver: bridge
    name: vtrack-network