services:
  #1. PostgreSQL Database Service
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    env_file:
      - .env  # Load environment variables from .env file
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vtrack-network

  #2. Redis Message Queue Service
  redis:
    image: redis:7-alpine
    container_name: redis_queue
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - vtrack-network

  #3. FastAPI Application Service
  api:
    build: .
    container_name: fastapi_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env  # Load the same environment file
      - .env.dev  # Load development overrides
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      COOKIE_REFRESHER_URL: http://cookie-refresher:8001
      PYTHONPATH: /app
    ports:
      - "8000:8000"
      - "5678:5678"  # Debug port
    #command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    command: python -m debugpy --listen 0.0.0.0:5678 -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app
      - ./requirements.txt:/app/requirements.txt  # Sync requirements
      - ./shared-package:/app/shared-package
    stdin_open: true
    tty: true
    networks:
      - vtrack-network
    # Development-specific settings
    working_dir: /app

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - vtrack-network

  # Migration service: runs Alembic migrations against the DB
  migrate:
    build: .
    container_name: migrate_job
    restart: "no"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head
    working_dir: /app
    volumes:
      - ./alembic.ini:/app/alembic.ini:ro
      - ./alembic:/app/alembic:ro
      - ./app:/app/app:ro
    networks:
      - vtrack-network

  # Microservices - Alert Processor
  alert-processor:
    build:
      context: .
      dockerfile: microservices/alert-processor/Dockerfile
    container_name: alert_processor
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: 1
    ports:
      - "5679:5679"  # Debug port
    volumes:
      - ./shared-package/src/shared/zones.yaml:/usr/local/lib/python3.11/site-packages/shared/zones.yaml
    networks:
      - vtrack-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  # Microservices - Notification Sender        
  notification-sender:
    build:
      context: .
      dockerfile: microservices/notification-sender/Dockerfile
    container_name: notification_sender
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      POLL_INTERVAL: 2
    env_file:
      - .env
    volumes:
      - ./microservices/notification-sender:/app
      - ./shared-package:/tmp/shared-package
    networks:
      - vtrack-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  # Optional: Data Collector Microservice (for independent data collection)
  # Uncomment to enable as a separate service
  # data-collector:
  #   build:
  #     context: .
  #     dockerfile: microservices/data-collector/Dockerfile
  #   container_name: data_collector
  #   restart: always
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   env_file:
  #     - .env
  #   environment:
  #     DATABASE_URL: ${DATABASE_URL}
  #     REDIS_URL: redis://redis:6379/0
  #     PYTHONUNBUFFERED: 1
  #   networks:
  #     - vtrack-network
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "3"

  # ── cookie-refresher ── AI agent that refreshes session cookies ────────────
  # VNC browser sandbox: headful Chromium + noVNC viewer at http://localhost:6080
  vnc-browser:
    build:
      context: ./microservices/cookie-refresher/vnc-browser
    container_name: vnc_browser
    restart: always
    ports:
      - "6080:6080"   # noVNC web viewer  → open http://localhost:6080 to watch
      - "5900:5900"   # raw VNC (optional native client)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 25s
      retries: 3
    networks:
      - vtrack-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # AI agent service: ReAct loop + Anthropic Computer Use
  cookie-refresher:
    build:
      context: ./microservices/cookie-refresher
    container_name: cookie_refresher
    restart: always
    env_file:
      - microservices/cookie-refresher/.env
    environment:
      VTRACK_API_URL: http://api:8000
      VNC_BROWSER_URL: http://vnc-browser:8080
    ports:
      - "8001:8001"
    depends_on:
      api:
        condition: service_healthy
      vnc-browser:
        condition: service_healthy
    networks:
      - vtrack-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:

networks:
  vtrack-network:
    driver: bridge