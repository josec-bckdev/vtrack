services:
  #1. PostgreSQL Database Service
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    env_file:
      - .env  # Load environment variables from .env file
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  #2. FastAPI Application Service
  api:
    build: .
    container_name: fastapi_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env  # Load the same environment file
      - .env.dev  # Load development overrides
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SCRAPER_EMAIL: ${LOGIN_EMAIL}
      SCRAPER_PASSWORD: ${LOGIN_PASSWORD}
      PYTHONPATH: /app
    ports:
      - "8000:8000"
      - "5678:5678"  # Debug port
    #command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    command: python -m debugpy --listen 0.0.0.0:5678 -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app
      - ./requirements.txt:/app/requirements.txt  # Sync requirements
    stdin_open: true
    tty: true
    # Development-specific settings
    working_dir: /app

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data: